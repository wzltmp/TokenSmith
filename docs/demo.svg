<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <!-- backdrop -->
  <rect x="0" y="0" width="1200" height="760" rx="16" fill="#0f1117"/>

  <!-- header -->
  <text x="32" y="44" fill="#e8eaf0" font-size="24" font-weight="700">Token<tspan fill="#7c5cff">Smith</tspan></text>
  <rect x="200" y="28" width="132" height="22" rx="11" fill="#242a3a"/>
  <text x="266" y="43" fill="#9aa3b2" font-size="12" text-anchor="middle">interactive demo</text>
  <text x="32" y="72" fill="#9aa3b2" font-size="13">Drag the controls to see what poor caching and bloated context cost — and what fixing them saves.</text>

  <!-- ===================== CARD A : CACHING ===================== -->
  <rect x="30" y="92" width="560" height="648" rx="14" fill="#171a23" stroke="#2a2f3e"/>
  <text x="54" y="124" fill="#9aa3b2" font-size="12" letter-spacing="1.4">CACHING LAYER</text>
  <text x="54" y="144" fill="#7c5cff" font-size="12" font-weight="600">Heavy scaffolding, underutilized caching</text>

  <!-- model select -->
  <text x="54" y="172" fill="#9aa3b2" font-size="12">Model</text>
  <rect x="54" y="180" width="512" height="30" rx="8" fill="#1f2330" stroke="#2a2f3e"/>
  <text x="68" y="200" fill="#e8eaf0" font-size="13">claude-sonnet-4.6</text>
  <text x="552" y="200" fill="#9aa3b2" font-size="12" text-anchor="end">&#9662;</text>

  <!-- sliders -->
  <!-- scaffold 8,000 -->
  <text x="54" y="232" fill="#9aa3b2" font-size="12">Static scaffold (system prompt, tools, policies) — 8,000 tokens</text>
  <rect x="54" y="242" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="54" y="242" width="97" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="151" cy="245" r="8" fill="#e8eaf0"/>
  <!-- dynamic 600 -->
  <text x="54" y="274" fill="#9aa3b2" font-size="12">Dynamic tokens per call — 600 tokens</text>
  <rect x="54" y="284" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="54" y="284" width="32" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="86" cy="287" r="8" fill="#e8eaf0"/>
  <!-- requests 50,000 -->
  <text x="54" y="316" fill="#9aa3b2" font-size="12">Requests / month — 50,000</text>
  <rect x="54" y="326" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="54" y="326" width="13" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="66" cy="329" r="8" fill="#e8eaf0"/>
  <!-- hit rate 95% -->
  <text x="54" y="358" fill="#9aa3b2" font-size="12">Cache hit rate — 95%</text>
  <rect x="54" y="368" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="54" y="368" width="486" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="540" cy="371" r="8" fill="#e8eaf0"/>

  <!-- metric tiles -->
  <g>
    <rect x="54" y="390" width="250" height="58" rx="10" fill="#1f2330" stroke="#2a2f3e"/>
    <text x="68" y="412" fill="#9aa3b2" font-size="11">Monthly cost — no caching</text>
    <text x="68" y="436" fill="#e8eaf0" font-size="20" font-weight="700">$1,552.50</text>
    <rect x="316" y="390" width="250" height="58" rx="10" fill="#13241d" stroke="#2f6b56"/>
    <text x="330" y="412" fill="#9aa3b2" font-size="11">Monthly cost — cached</text>
    <text x="330" y="436" fill="#36d399" font-size="20" font-weight="700">$541.50</text>
    <rect x="54" y="456" width="250" height="58" rx="10" fill="#13241d" stroke="#2f6b56"/>
    <text x="68" y="478" fill="#9aa3b2" font-size="11">Savings</text>
    <text x="68" y="502" fill="#36d399" font-size="20" font-weight="700">$1,011.00  (65%)</text>
    <rect x="316" y="456" width="250" height="58" rx="10" fill="#1f2330" stroke="#2a2f3e"/>
    <text x="330" y="478" fill="#9aa3b2" font-size="11">Latency / call (cold &#8594; warm)</text>
    <text x="330" y="502" fill="#e8eaf0" font-size="20" font-weight="700">2492 &#8594; 2302 ms</text>
  </g>

  <!-- hit-rate sweep bars -->
  <text x="54" y="542" fill="#9aa3b2" font-size="11" letter-spacing="1">MONTHLY COST BY CACHE HIT RATE</text>
  <g font-size="12">
    <!-- baseline scale: max ~1852 -> width 380 -->
    <!-- 0% : 1852.50 (worse, red) -->
    <text x="54" y="562" fill="#9aa3b2">0%</text>
    <rect x="120" y="552" width="380" height="13" rx="4" fill="#242a3a"/>
    <rect x="120" y="552" width="380" height="13" rx="4" fill="#ef5e6b" opacity="0.85"/>
    <text x="566" y="562" fill="#9aa3b2" text-anchor="end">$1,852</text>
    <!-- 28% star -->
    <text x="54" y="582" fill="#c9bdff">28% &#9733;</text>
    <rect x="120" y="572" width="380" height="13" rx="4" fill="#242a3a"/>
    <rect x="120" y="572" width="301" height="13" rx="4" fill="#7c5cff"/>
    <text x="566" y="582" fill="#9aa3b2" text-anchor="end">$1,466</text>
    <!-- 50% -->
    <text x="54" y="602" fill="#9aa3b2">50%</text>
    <rect x="120" y="592" width="380" height="13" rx="4" fill="#242a3a"/>
    <rect x="120" y="592" width="239" height="13" rx="4" fill="#36d399" opacity="0.8"/>
    <text x="566" y="602" fill="#9aa3b2" text-anchor="end">$1,162</text>
    <!-- 80% -->
    <text x="54" y="622" fill="#9aa3b2">80%</text>
    <rect x="120" y="612" width="380" height="13" rx="4" fill="#242a3a"/>
    <rect x="120" y="612" width="154" height="13" rx="4" fill="#36d399" opacity="0.85"/>
    <text x="566" y="622" fill="#9aa3b2" text-anchor="end">$748</text>
    <!-- 95% -->
    <text x="54" y="642" fill="#9aa3b2">95%</text>
    <rect x="120" y="632" width="380" height="13" rx="4" fill="#242a3a"/>
    <rect x="120" y="632" width="111" height="13" rx="4" fill="#36d399"/>
    <text x="566" y="642" fill="#9aa3b2" text-anchor="end">$541</text>
    <!-- 100% -->
    <text x="54" y="662" fill="#9aa3b2">100%</text>
    <rect x="120" y="652" width="380" height="13" rx="4" fill="#242a3a"/>
    <rect x="120" y="652" width="97" height="13" rx="4" fill="#36d399"/>
    <text x="566" y="662" fill="#9aa3b2" text-anchor="end">$472</text>
  </g>
  <rect x="54" y="686" width="512" height="40" rx="8" fill="#13241d"/>
  <text x="66" y="703" fill="#9be7c8" font-size="11">A typical 28% hit rate costs $1,466/mo here. Reaching 95% saves a</text>
  <text x="66" y="719" fill="#9be7c8" font-size="11">further $925/mo — and at 0% reuse, caching actually costs 19% MORE.</text>

  <!-- ===================== CARD B : CONTEXT ===================== -->
  <rect x="610" y="92" width="560" height="648" rx="14" fill="#171a23" stroke="#2a2f3e"/>
  <text x="634" y="124" fill="#9aa3b2" font-size="12" letter-spacing="1.4">CONTEXT-ENGINEERING LAYER</text>
  <text x="634" y="144" fill="#36d399" font-size="12" font-weight="600">Exploding context — signal &gt; volume</text>

  <!-- sliders -->
  <text x="634" y="172" fill="#9aa3b2" font-size="12">Retrieved documents — 29</text>
  <rect x="634" y="182" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="634" y="182" width="110" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="744" cy="185" r="8" fill="#e8eaf0"/>

  <text x="634" y="214" fill="#9aa3b2" font-size="12">Avg tokens per document — 320</text>
  <rect x="634" y="224" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="634" y="224" width="123" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="757" cy="227" r="8" fill="#e8eaf0"/>

  <text x="634" y="256" fill="#9aa3b2" font-size="12">Near-duplicate share — 35%</text>
  <rect x="634" y="266" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="634" y="266" width="224" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="858" cy="269" r="8" fill="#e8eaf0"/>

  <text x="634" y="298" fill="#9aa3b2" font-size="12">Irrelevant (noise) share — 55%</text>
  <rect x="634" y="308" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="634" y="308" width="313" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="947" cy="311" r="8" fill="#e8eaf0"/>

  <text x="634" y="340" fill="#9aa3b2" font-size="12">Context token budget — 2,000</text>
  <rect x="634" y="350" width="512" height="6" rx="3" fill="#242a3a"/>
  <rect x="634" y="350" width="118" height="6" rx="3" fill="#7c5cff"/>
  <circle cx="752" cy="353" r="8" fill="#e8eaf0"/>

  <!-- metric tiles -->
  <g>
    <rect x="634" y="390" width="250" height="58" rx="10" fill="#1f2330" stroke="#2a2f3e"/>
    <text x="648" y="412" fill="#9aa3b2" font-size="11">Raw context</text>
    <text x="648" y="436" fill="#e8eaf0" font-size="20" font-weight="700">2,529 tok</text>
    <rect x="896" y="390" width="250" height="58" rx="10" fill="#13241d" stroke="#2f6b56"/>
    <text x="910" y="412" fill="#9aa3b2" font-size="11">Engineered context</text>
    <text x="910" y="436" fill="#36d399" font-size="20" font-weight="700">216 tok</text>
    <rect x="634" y="456" width="250" height="58" rx="10" fill="#13241d" stroke="#2f6b56"/>
    <text x="648" y="478" fill="#9aa3b2" font-size="11">Token reduction</text>
    <text x="648" y="502" fill="#36d399" font-size="20" font-weight="700">92%</text>
    <rect x="896" y="456" width="250" height="58" rx="10" fill="#1f2330" stroke="#2a2f3e"/>
    <text x="910" y="478" fill="#9aa3b2" font-size="11">Docs kept</text>
    <text x="910" y="502" fill="#e8eaf0" font-size="20" font-weight="700">4 / 29</text>
  </g>

  <!-- document fate -->
  <text x="634" y="542" fill="#9aa3b2" font-size="11" letter-spacing="1">DOCUMENT FATE  (green = kept, red = dedup / dropped)</text>
  <g>
    <!-- 4 kept (green) -->
    <rect x="634" y="552" width="60" height="12" rx="3" fill="#36d399"/>
    <rect x="700" y="552" width="60" height="12" rx="3" fill="#36d399"/>
    <rect x="766" y="552" width="60" height="12" rx="3" fill="#36d399"/>
    <rect x="832" y="552" width="60" height="12" rx="3" fill="#36d399"/>
    <!-- dropped (faded red), rest of width -->
    <rect x="898" y="552" width="248" height="12" rx="3" fill="#ef5e6b" opacity="0.32"/>
    <text x="634" y="584" fill="#9be7c8" font-size="12">4 kept  &#183;  6 duplicates removed  &#183;  19 low-signal / over-budget dropped</text>
  </g>

  <!-- gold recall callout -->
  <rect x="634" y="600" width="512" height="58" rx="10" fill="#13241d" stroke="#2f6b56"/>
  <text x="648" y="624" fill="#9aa3b2" font-size="11">Answer-bearing ("gold") documents retained</text>
  <text x="648" y="648" fill="#36d399" font-size="20" font-weight="700">100% recall</text>

  <rect x="634" y="670" width="512" height="56" rx="8" fill="#13241d"/>
  <text x="646" y="692" fill="#9be7c8" font-size="11">92% of context tokens dropped while keeping every document that</text>
  <text x="646" y="710" fill="#9be7c8" font-size="11">actually contained the answer — signal over volume, quantified.</text>
</svg>
